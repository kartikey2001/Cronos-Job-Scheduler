# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=chronos
server.port=8080

# ── DataSource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# ── Quartz ────────────────────────────────────────────────────────────────────
spring.quartz.job-store-type=memory
spring.quartz.overwrite-existing-jobs=true

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-ms=${JWT_EXPIRY_MS}

# ── Mail ──────────────────────────────────────────────────────────────────────
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM}

# ── Application defaults ──────────────────────────────────────────────────────
app.scheduler.poll-interval-ms=${SCHEDULER_POLL_INTERVAL_MS:10000}
app.job.max-retries-default=${MAX_RETRIES_DEFAULT:3}
app.job.retry-delay-ms-default=${RETRY_DELAY_MS_DEFAULT:5000}
app.retry.queue=job:retry

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] %-5level %logger{36} - %msg%n
